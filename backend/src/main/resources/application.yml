spring:
  application:
    name: baby-shop-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:babyshop}
    username: ${DB_USERNAME:babyshop_user}
    password: ${DB_PASSWORD:babyshop_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BabyShopHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      initialization-fail-timeout: ${DB_INIT_FAIL_TIMEOUT:0}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:5050}

app:
  payment:
    mock:
      callback-secret: ${MOCK_PAYMENT_CALLBACK_SECRET:mock-callback-secret-change-me}
  security:
    admin:
      email: ${ADMIN_EMAIL:admin@babyshop.local}
      password: ${ADMIN_PASSWORD:change-me}
      role: ${ADMIN_ROLE:ADMIN}
      bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    jwt:
      secret: ${JWT_SECRET:change-this-jwt-secret-for-local-dev-12345}
      access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:120}
      issuer: ${JWT_ISSUER:baby-shop-backend}
